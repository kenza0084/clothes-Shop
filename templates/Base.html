<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Jost', sans-serif;
      background: #F5F5F0;
      color: #4A3933;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #F5F5F0;
      border-bottom: 1px solid rgba(74,57,51,0.14);
      display: flex;
      justify-content: space-between;
      padding: 0 4rem;
      height: 72px;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      text-decoration: none;
      color: #4A3933;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: #7a6258;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    .nav-links a:hover {
      color: #4A3933;
    }

    .nav-actions {
      position: relative;
    }

    .cart-badge {
      position: absolute;
      top: -5px;
      right: -10px;
      background: #4A3933;
      color: white;
      font-size: 10px;
      border-radius: 50%;
      padding: 2px 6px;
    }
  </style>
</head>

<body>

<nav>

  <ul class="nav-links">
    <li><a href="{{ url_for('') }}">Boutique</a></li>
    <li><a href="{{ url_for('cart') }}">Panier</a></li>
  </ul>

  <div class="nav-actions">
    <a href="{{ url_for('cart') }}">
      🛒
      <span class="cart-badge">{{ cart_count }}</span>
    </a>
  </div>
</nav>

{% block content %}{% endblock %}

</body>
</html>
